<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | MindSpace</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      margin: 0;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Animated background blob */
    .bg-blob {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(74, 144, 226, 0.1) 0%, transparent 70%);
      filter: blur(80px);
      z-index: -1;
      border-radius: 50%;
      animation: move 20s infinite alternate;
    }

    @keyframes move {
      0% { transform: translate(-10%, -10%); }
      100% { transform: translate(10%, 10%); }
    }

    .hero-section {
      text-align: center;
      z-index: 1;
      padding: 2rem;
      width: 100%;
      max-width: 1000px;
    }

    .hero-title {
      font-size: 4.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }

    .hero-subtitle {
      font-size: 1.25rem;
      color: var(--text-light);
      font-weight: 500;
      margin-bottom: 4rem;
    }

    .portal-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2.5rem;
      width: 100%;
    }

    .portal-card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 35px;
      padding: 3.5rem 2.5rem;
      text-decoration: none;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .portal-card:hover {
      transform: translateY(-12px);
      background: white;
      box-shadow: 0 40px 80px rgba(0,0,0,0.08);
      border-color: var(--primary);
    }

    .portal-icon {
      font-size: 3.5rem;
      margin-bottom: 2rem;
      background: #f8fafc;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      transition: all 0.5s ease;
      color: #718096;
    }

    .portal-card:hover .portal-icon {
      transform: scale(1.1) rotate(5deg);
      background: var(--primary);
      color: white;
    }

    .portal-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 1rem;
    }

    .portal-desc {
      color: var(--text-light);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .portal-btn {
      padding: 1rem 2.5rem;
      background: #f1f5f9;
      color: var(--text-dark);
      border-radius: 20px;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    .portal-card:hover .portal-btn {
      background: var(--primary);
      color: white;
      box-shadow: 0 10px 25px rgba(74, 144, 226, 0.3);
    }

    .admin-card:hover .portal-icon {
      background: var(--accent) !important;
    }
    .admin-card:hover .portal-btn {
      background: var(--accent) !important;
      box-shadow: 0 10px 25px rgba(237, 100, 166, 0.3);
    }

    @media (max-width: 768px) {
      .hero-title { font-size: 3rem; }
      body { overflow-y: auto; align-items: flex-start; padding-top: 4rem; }
    }
  </style>
</head>
<body>
  <div class="bg-blob"></div>
  
  <div class="hero-section fade-in">
    <div style="margin-bottom: 3rem;">
      <img src="images/logo.png" alt="MindSpace" style="height: 80px; width: 80px; border-radius: 22px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 1.5rem;">
      <h1 class="hero-title">MindSpace</h1>
      <p class="hero-subtitle">Your personal sanctuary for mental wellness.</p>
    </div>

    <div class="portal-container">
      <a href="user-login.html" class="portal-card">
        <div class="portal-icon">🌿</div>
        <div class="portal-title">User Portal</div>
        <p class="portal-desc">
          Daily mood tracking, personal diary, anonymous 1-on-1 support chat, and guided tools.
        </p>
        <div class="portal-btn">Get Started</div>
      </a>

      <a href="admin-login.html" class="portal-card admin-card">
        <div class="portal-icon">📊</div>
        <div class="portal-title">NGO Admin</div>
        <p class="portal-desc">
          Monitor platform usage, view anonymous wellness trends, and track high-stress alerts.
        </p>
        <div class="portal-btn">Access Metrics</div>
      </a>
    </div>
  </div>
</body>
</html>
