<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | MindSpace</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #f8fafc;
      padding: 0;
    }

    /* Admin Top Nav */
    .admin-nav {
      background: white;
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid #edf2f7;
    }

    .admin-container {
      max-width: 1400px;
      margin: 3rem auto;
      padding: 0 2rem;
    }

    .pro-header {
      margin-bottom: 3rem;
    }

    .pro-header h1 { font-size: 2.8rem; letter-spacing: -0.05em; margin: 0; }
    .pro-header p { font-size: 1.1rem; color: var(--text-light); margin-top: 0.5rem; }

    /* Pro Metric Cards */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
      margin-bottom: 4rem;
    }

    .metric-card {
      background: white;
      padding: 2.5rem;
      border-radius: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.02);
    }

    .metric-card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(74, 144, 226, 0.05) 0%, transparent 70%);
      transform: translate(30%, -30%);
    }

    .metric-icon {
      width: 55px; height: 55px;
      border-radius: 18px;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
    }

    .metric-label {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-light);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .metric-value {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text-dark);
      line-height: 1;
    }

    /* Chart Panels */
    .pro-panel {
      background: white;
      border-radius: 32px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
      margin-bottom: 2.5rem;
      border: 1px solid rgba(0,0,0,0.02);
    }

    .panel-title {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chart-box { height: 400px; width: 100%; }

    /* Dashboard Layout */
    .pro-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2.5rem;
    }

    @media (max-width: 1024px) {
      .pro-layout {
        grid-template-columns: 1fr;
      }
    }

    /* Alerts List */
    .alert-scroll {
      max-height: 600px;
      overflow-y: auto;
      padding-right: 15px;
    }

    .alert-card {
      background: #fff5f5;
      padding: 1.5rem;
      border-radius: 20px;
      margin-bottom: 1.2rem;
      border-left: 5px solid #e11d48;
      transition: all 0.3s ease;
    }

    .alert-card:hover { transform: translateX(8px); }

    .alert-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.8rem;
    }

    .alert-user { font-weight: 800; color: #991b1b; }
    .alert-level { background: #e11d48; color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; }
  </style>
</head>
<body>
  <nav class="admin-nav">
    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="MindSpace" style="height: 38px; width: 38px; border-radius: 10px; vertical-align: middle;">
      MindSpace Pro
    </a>
    <button id="btn-logout-admin" class="btn btn-accent" style="background: #e11d48; border-radius: 14px; padding: 0.6rem 1.2rem;">Log Out</button>
  </nav>

  <div class="admin-container fade-in">
    <div class="pro-header">
      <h1>Global Insights</h1>
      <p>Performance metrics and high-priority wellness alerts.</p>
    </div>

    <!-- Top Stats -->
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-icon">👥</div>
        <div class="metric-label">Registered users</div>
        <div id="stat-users" class="metric-value">--</div>
      </div>
      <div class="metric-card">
        <div class="metric-icon">📈</div>
        <div class="metric-label">Mood logs (Total)</div>
        <div id="stat-moods" class="metric-value">--</div>
      </div>
      <div class="metric-card">
        <div class="metric-icon">🧘</div>
        <div class="metric-label">Avg stress Index</div>
        <div id="stat-stress" class="metric-value">--</div>
      </div>
    </div>

    <!-- Full Width Trends -->
    <div class="pro-panel">
      <div class="panel-title">📉 Global Community Engagement</div>
      <div class="chart-box">
        <canvas id="barChart"></canvas>
      </div>
    </div>

    <div class="pro-layout">
      <!-- Left Column -->
      <div class="pro-col">
        <div class="pro-panel">
          <div class="panel-title">🧠 Stress Trajectory</div>
          <div class="chart-box" style="height: 300px;">
            <canvas id="lineChart"></canvas>
          </div>
        </div>
        <div class="pro-panel">
          <div class="panel-title">📊 Community Distribution</div>
          <div class="chart-box" style="height: 300px;">
            <canvas id="doughnutChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Right Column: Priority Alerts -->
      <div class="pro-col">
        <div class="pro-panel" style="border-top: 6px solid #e11d48; height: calc(100% - 2.5rem);">
          <div class="panel-title" style="color: #e11d48;">🚨 Priority Alerts</div>
          <div class="alert-scroll" id="alerts-list">
            <p class="text-muted">Loading pulse data...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api';
    Chart.defaults.font.family = "'Outfit', sans-serif";
    Chart.defaults.color = '#718096';

    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('btn-logout-admin').addEventListener('click', () => {
        localStorage.removeItem('admin_token');
        window.location.href = 'index.html';
      });

      const token = localStorage.getItem('admin_token');
      if (!token) { window.location.href = 'admin-login.html'; return; }

      try {
        const res = await fetch(`${API_URL}/admin/stats`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        
        if (data.error) {
          window.location.href = 'admin-login.html';
          return;
        }

        // Stats
        document.getElementById('stat-users').innerText = data.totalUsers || 0;
        document.getElementById('stat-moods').innerText = data.totalMoods || 0;
        document.getElementById('stat-stress').innerText = data.avgStress ? data.avgStress.toFixed(1) : '0.0';

        // Alerts
        const list = document.getElementById('alerts-list');
        list.innerHTML = '';
        if (data.recentAlerts?.length > 0) {
          data.recentAlerts.forEach(a => {
            const card = document.createElement('div');
            card.className = 'alert-card';
            card.innerHTML = `
              <div class="alert-header">
                <span class="alert-user">${a.userId?.anonymousId?.substring(0,8) || 'Anon'}...</span>
                <span class="alert-level">LV ${a.stressLevel}</span>
              </div>
              <div style="font-size: 0.95rem; line-height: 1.5;">
                <span style="font-size: 1.4rem; margin-right: 10px;">${a.emoji}</span>
                ${a.note ? `<span style="font-style: italic;">"${a.note}"</span>` : 'No comment provided.'}
              </div>
            `;
            list.appendChild(card);
          });
        } else {
          list.innerHTML = '<p class="text-muted" style="text-align: center; padding-top: 4rem;">Quiet hour. No active alerts.</p>';
        }

        // Charts
        const timeLabels = data.moodsOverTime?.map(i => i._id) || ['None'];
        const engageData = data.moodsOverTime?.map(i => i.count) || [0];
        const stressLineData = data.moodsOverTime?.map(i => i.avgStress || 0) || [0];

        // Bar
        new Chart(document.getElementById('barChart'), {
          type: 'bar',
          data: {
            labels: timeLabels,
            datasets: [{
              label: 'Interactions',
              data: engageData,
              backgroundColor: '#4a90e2',
              borderRadius: 12
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { grid: { borderDash: [5, 5] }, beginAtZero: true },
              x: { grid: { display: false } }
            }
          }
        });

        // Line
        new Chart(document.getElementById('lineChart'), {
          type: 'line',
          data: {
            labels: timeLabels,
            datasets: [{
              label: 'Stress Index',
              data: stressLineData,
              borderColor: '#e11d48',
              backgroundColor: 'rgba(225, 29, 72, 0.05)',
              fill: true,
              tension: 0.4,
              pointRadius: 6,
              pointBackgroundColor: '#fff'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { max: 10, beginAtZero: true, grid: { borderDash: [5, 5] } }
            }
          }
        });

        // Doughnut
        const distData = data.stressDistribution || [];
        new Chart(document.getElementById('doughnutChart'), {
          type: 'doughnut',
          data: {
            labels: distData.map(i => `LV ${i._id}`),
            datasets: [{
              data: distData.map(i => i.count),
              backgroundColor: ['#48bb78', '#38b2ac', '#4a90e2', '#6b46c1', '#ed64a6', '#e11d48'],
              borderWidth: 0,
              hoverOffset: 20
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '80%',
            plugins: { legend: { position: 'right' } }
          }
        });

      } catch (err) { console.error(err); }
    });
  </script>
</body>
</html>
