<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGO Consultant Support Center | MindSpace</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #11111e;
      --surface: #1a1a2e;
      --surface2: #252545;
      --border: rgba(140, 122, 230, 0.15);
      --text: #ffffff;
      --muted: #8892b0;
      --primary: #8c7ae6;
      --primary-glow: rgba(140, 122, 230, 0.2);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --accent: #ed4899;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow: hidden; }

    .support-console {
      display: grid;
      grid-template-columns: 320px 1fr 300px;
      height: calc(100vh - 120px);
      background: var(--surface);
      margin: 1rem 2.5rem;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* 1. Sidebar: Active Chats */
    .chats-sidebar {
      border-right: 1px solid rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      background: #fafafa;
    }

    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); }

    .chat-item {
      padding: 1.2rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .chat-item:hover { background: var(--surface2); }
    .chat-item.active { background: var(--primary-glow); border-left: 4px solid var(--primary); }
    .chat-item.urgent { border-left: 4px solid var(--danger); animation: urgentPulse 2s infinite; }

    @keyframes urgentPulse {
      0% { box-shadow: inset 0 0 0px rgba(239, 68, 68, 0); }
      50% { box-shadow: inset 0 0 15px rgba(239, 68, 68, 0.15); }
      100% { box-shadow: inset 0 0 0px rgba(239, 68, 68, 0); }
    }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .status-online { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-offline { background: var(--muted); opacity: 0.5; }

    .wait-timer { font-size: 0.65rem; color: var(--muted); font-weight: 700; }

    /* 2. Main Window: Conversation */
    .conversation-view {
      display: flex;
      flex-direction: column;
      background: white;
    }

    .conv-header {
      padding: 1rem 2rem;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .messages-area {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .bubble {
      max-width: 70%;
      padding: 1rem 1.4rem;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .received { 
      background: var(--surface2); 
      align-self: flex-start; 
      border-radius: 0 15px 15px 15px;
      border: 1px solid #30304b;
      color: #fff;
    }
    .sent { 
      background: linear-gradient(135deg, #4834d4, #686de0); 
      color: white; 
      align-self: flex-end; 
      border-radius: 15px 15px 0 15px;
      box-shadow: 0 4px 10px rgba(72, 52, 212, 0.3);
    }

    /* Empathy Tools */
    .empathy-tools {
      padding: 0.8rem 2rem;
      background: rgba(0,0,0,0.1);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      overflow-x: auto;
    }

    .canned-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--primary);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      font-weight: 600;
    }

    .canned-btn:hover { background: var(--primary); color: white; }

    .input-box {
      padding: 1.2rem 2rem 1.8rem;
      background: var(--surface);
      display: flex;
      gap: 15px;
      border-top: 1px solid var(--border);
    }
    .input-box input { background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 12px; }

    /* 3. Context Panel */
    .context-panel {
      padding: 2rem;
      background: #fafafa;
      border-left: 1px solid rgba(0,0,0,0.05);
    }

    .user-profile { text-align: center; margin-bottom: 2rem; }
    .status-card {
      background: white;
      padding: 1.2rem;
      border-radius: 15px;
      margin-bottom: 1rem;
      border: 1px solid rgba(0,0,0,0.03);
    }
  </style>
</head>
<body>
  <header style="background: white;">
    <a href="admin.html" class="logo">
      <img src="images/logo.png" alt="MindSpace" style="height: 38px; width: 38px; border-radius: 10px; vertical-align: middle;">
      NGO <span style="font-size: 0.7rem; background: var(--primary); color: white; padding: 2px 8px; border-radius: 6px; margin-left: 8px;">Support Center</span>
    </a>
    <nav>
      <a href="admin.html">Dashboard</a>
      <a href="consultant-dashboard.html" class="active">Support Console</a>
      <a href="#" id="btn-logout" style="color: #ef4444; font-weight: 700;">Logout</a>
    </nav>
  </header>

  <div class="support-console">
    <!-- Active Chats Sidebar -->
    <aside class="chats-sidebar">
      <div class="sidebar-header">
        <h4 style="margin: 0;">Active Support Requests</h4>
      </div>
      <div id="active-chats-list" class="queue-list">
        <!-- JS Polled Sessions -->
      </div>
    </aside>

    <!-- Main Conversation View -->
    <main class="conversation-view">
      <div id="no-chat-selected" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.4;">
        <div style="font-size: 4rem;">🕊️</div>
        <h3>Select a user to begin supporting</h3>
      </div>

      <div id="chat-active-window" style="display: none; height: 100%; flex-direction: column;">
        <div class="conv-header">
          <h4 id="active-user-title">User Name</h4>
          <button class="btn btn-primary" id="btn-resolve" style="background: var(--success); font-size: 0.8rem; padding: 0.5rem 1rem;">End Session ✅</button>
        </div>

        <div class="messages-area" id="messages-container"></div>

        <!-- Empathy Toolkit -->
        <div class="empathy-tools">
          <button class="canned-btn" onclick="injectMsg('I hear you, and I\'m here to listen.')">I hear you...</button>
          <button class="canned-btn" onclick="injectMsg('That sounds really difficult to navigate.')">That sounds difficult.</button>
          <button class="canned-btn" onclick="injectMsg('Take your time, there is no rush here.')">No rush...</button>
          <button class="canned-btn" onclick="injectMsg('You\'re doing the right thing by speaking up.')">Doing right thing...</button>
        </div>

        <div class="input-box">
          <input type="text" id="chat-input" placeholder="Type your empathetic response..." style="margin-bottom: 0;">
          <button class="btn btn-primary" id="btn-send" style="padding: 0 1.5rem;">Send ✨</button>
        </div>
      </div>
    </main>

    <!-- User Context Panel -->
    <aside class="context-panel">
      <div class="user-profile">
        <div style="font-size: 3rem; margin-bottom: 1rem;">👤</div>
        <h3 id="panel-username">User</h3>
        <p class="text-muted" id="panel-id" style="font-size: 0.7rem;">ID: -</p>
      </div>

      <div class="status-card">
        <p class="text-muted" style="font-size: 0.7rem; text-transform: uppercase; font-weight: 800; margin-bottom: 10px;">Stress Level</p>
        <div id="panel-stress-bar" style="height: 8px; background: #eee; border-radius: 4px; overflow: hidden;">
          <div id="panel-stress-fill" style="width: 0%; height: 100%; background: var(--primary);"></div>
        </div>
        <p id="panel-stress-text" style="font-size: 0.8rem; margin-top: 8px; font-weight: 700;">Loading...</p>
      </div>

      <div class="status-card">
        <p class="text-muted" style="font-size: 0.7rem; text-transform: uppercase; font-weight: 800; margin-bottom: 10px;">Session Info</p>
        <p style="font-size: 0.9rem; margin-bottom: 4px;">Status: <span id="panel-status-tag" style="color: var(--success); font-weight: 700;">Active</span></p>
        <p style="font-size: 0.9rem;">Duration: <span id="panel-duration">0m</span></p>
      </div>
    </aside>
  </div>

  <script src="js/consultant-dashboard.js"></script>
</body>
</html>
