<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat | MindSpace</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <header>
    <a href="home.html" class="logo"><img src="images/logo.png" alt="MindSpace" style="height: 35px; width: 35px; border-radius: 8px; vertical-align: middle;"> MindSpace</a>
    <nav>
      <a href="home.html">Home</a>
      <a href="diary.html">Diary</a>
      <a href="chat.html" class="active">Chat</a>
      <a href="relax.html">Relax</a>
    </nav>
  </header>

  <main class="glass-container fade-in">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
      <h2 style="margin: 0;">1-on-1 Support Chat</h2>
      <button id="skip-btn" class="btn" style="background: rgba(217, 4, 41, 0.1); color: #d90429; display: none; padding: 0.5rem 1rem;">Skip Partner ⏭</button>
    </div>
    <p class="text-muted" style="margin-bottom: 1rem;">You are completely anonymous. No data is saved.</p>
    
    <div id="chat-status" style="background: rgba(56, 178, 172, 0.1); color: var(--accent); padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 1rem; font-weight: bold;">
      Connecting...
    </div>

    <div class="chat-window" id="chat-window">
      <!-- Messages appear here -->
    </div>

    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="Type a message...">
      <button id="send-chat" class="btn btn-accent">Send</button>
    </div>
  </main>

  <script src="js/chat.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
