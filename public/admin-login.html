<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGO Admin Login | MindSpace</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: linear-gradient(135deg, #fcdada 0%, #f8b1b1 100%);">
  <header style="justify-content: center; margin-bottom: 2rem;">
    <a href="home.html" class="logo" style="font-size: 2.2rem; color: #d90429;"><img src="images/logo.png" alt="MindSpace" style="height: 40px; width: 40px; border-radius: 8px; vertical-align: middle;"> MindSpace Admin</a>
  </header>

  <main class="glass-container fade-in" style="max-width: 500px; text-align: center; border-color: rgba(217, 4, 41, 0.3);">
    <h2 style="color: #d90429;">Secure NGO Access</h2>
    <p class="text-muted" style="margin-bottom: 2rem;">Authorized personnel only. Please sign in to access the analytics dashboard.</p>

    <!-- Admin Login Form -->
    <form id="admin-auth-form" style="text-align: left;">
      <label for="admin-username" style="font-weight: 500;">Admin ID</label>
      <input type="text" id="admin-username" placeholder="Enter admin username" required>
      
      <label for="admin-password" style="font-weight: 500;">Password</label>
      <input type="password" id="admin-password" placeholder="Enter admin password" required>
      
      <button type="submit" id="submit-admin-auth" class="btn" style="width: 100%; margin-top: 1rem; background: #d90429;">Access Dashboard</button>
    </form>

    <div style="text-align: right; margin-top: 0.8rem;">
      <a href="#" id="admin-forgot-link" style="font-size: 0.85rem; color: #d90429; text-decoration: none; font-weight: 500;">Forgot Password?</a>
    </div>

    <div style="margin-top: 1.5rem;">
      <a href="index.html" style="font-size: 0.9rem; color: var(--text-dark); text-decoration: none;">&larr; Return to Home</a>
    </div>

  </main>

  <div id="admin-auth-error" style="color: #d90429; margin-top: 1rem; text-align: center; font-weight: bold;"></div>

  <!-- Forgot Password Modal for Admin -->
  <div id="admin-reset-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; display:none; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:24px; padding:2.5rem; max-width:420px; width:90%; box-shadow:0 25px 50px rgba(0,0,0,0.15); text-align:center; position:relative;">
      <button id="admin-close-reset" style="position:absolute; top:12px; right:18px; background:none; border:none; font-size:1.5rem; cursor:pointer; color:#999;">&times;</button>
      <h3 style="margin-bottom:0.5rem; color:#d90429;">Reset Admin Password</h3>
      <p style="color:#6b7280; font-size:0.9rem; margin-bottom:1.5rem;">Enter your Admin ID and choose a new password.</p>
      <input type="text" id="admin-reset-username" placeholder="Admin username" style="width:100%; padding:12px; margin-bottom:1rem; border:2px solid #e5e7eb; border-radius:12px; font-size:1rem; box-sizing:border-box;">
      <input type="password" id="admin-reset-new-password" placeholder="New password" style="width:100%; padding:12px; margin-bottom:1rem; border:2px solid #e5e7eb; border-radius:12px; font-size:1rem; box-sizing:border-box;">
      <button id="admin-reset-submit" class="btn" style="width:100%; padding:12px; border-radius:12px; font-size:1rem; background:#d90429;">Reset Password</button>
      <div id="admin-reset-msg" style="margin-top:1rem; font-size:0.9rem;"></div>
    </div>
  </div>

  <script src="js/admin-login.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const modal = document.getElementById('admin-reset-modal');
      const forgotLink = document.getElementById('admin-forgot-link');
      const closeBtn = document.getElementById('admin-close-reset');
      const resetSubmit = document.getElementById('admin-reset-submit');
      const resetMsg = document.getElementById('admin-reset-msg');

      forgotLink.addEventListener('click', (e) => {
        e.preventDefault();
        modal.style.display = 'flex';
      });

      closeBtn.addEventListener('click', () => {
        modal.style.display = 'none';
        resetMsg.innerText = '';
      });

      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.style.display = 'none';
          resetMsg.innerText = '';
        }
      });

      resetSubmit.addEventListener('click', async () => {
        const username = document.getElementById('admin-reset-username').value.trim();
        const newPassword = document.getElementById('admin-reset-new-password').value.trim();
        if (!username || !newPassword) {
          resetMsg.style.color = 'red';
          resetMsg.innerText = 'Please fill in both fields.';
          return;
        }
        try {
          const res = await fetch('http://localhost:3000/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, newPassword })
          });
          const data = await res.json();
          if (data.success) {
            resetMsg.style.color = '#16a34a';
            resetMsg.innerText = '✅ ' + data.message;
            setTimeout(() => { modal.style.display = 'none'; resetMsg.innerText = ''; }, 2000);
          } else {
            resetMsg.style.color = 'red';
            resetMsg.innerText = data.error;
          }
        } catch (err) {
          resetMsg.style.color = 'red';
          resetMsg.innerText = 'Network error. Try again.';
        }
      });
    });
  </script>
</body>
</html>
